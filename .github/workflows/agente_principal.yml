# GitHub Actions — Orquestrador do Robo-Markplaces
name: Robo-Markplaces

# Agendamento: expressões cron em UTC (padrão GitHub). BRT = UTC−3 (sem horário de verão no BR).
on:
  schedule:
    # --- Relatório diário: 08:00 BRT ---
    - cron: "0 11 * * *"
    # --- Chat a cada 30 min: 08:00–20:30 BRT (UTC 11–23h) + 21:00–21:30 BRT (UTC 00h) ---
    - cron: "*/30 11-23 * * *"
    - cron: "*/30 0 * * *"
    # --- Saúde / algoritmo: 00, 06, 12 e 18 BRT (03, 09, 15 e 21 UTC) ---
    - cron: "0 3 * * *"
    - cron: "0 9 * * *"
    - cron: "0 15 * * *"
    - cron: "0 21 * * *"
  workflow_dispatch:
    inputs:
      rotina:
        description: "Rotina a executar"
        required: true
        default: "todos"
        type: choice
        options:
          - todos
          - testes
          - relatorio
          - chat
          - vendas_whatsapp
          - algoritmo

env:
  PYTHON_VERSION: "3.11"

jobs:
  qualidade:
    name: Qualidade (lint + testes)
    runs-on: ubuntu-latest
    # Qualquer schedule ou disparo manual precisa passar aqui primeiro (needs dos outros jobs).
    if: |
      github.event_name == 'schedule' ||
      github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
      - name: Instalar dependências
        run: |
          pip install -r requirements.txt
          pip install -r requirements-dev.txt
      - name: Lint
        run: ruff check api agentes core integracoes tests
      - name: Testes
        run: python -m unittest discover -s tests -p "test_*.py"

  relatorio:
    name: Relatório diário
    runs-on: ubuntu-latest
    needs: qualidade
    if: |
      (github.event_name == 'schedule' && github.event.schedule == '0 11 * * *') ||
      github.event.inputs.rotina == 'todos' ||
      github.event.inputs.rotina == 'relatorio'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
      - name: Instalar dependências
        run: pip install -r requirements.txt
      - name: Executar relatório
        run: python -c "from agentes.relatorio import executar; executar()"
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          BLING_CLIENT_ID: ${{ secrets.BLING_CLIENT_ID }}
          BLING_CLIENT_SECRET: ${{ secrets.BLING_CLIENT_SECRET }}
          BLING_ACCESS_TOKEN: ${{ secrets.BLING_ACCESS_TOKEN }}
          BLING_REFRESH_TOKEN: ${{ secrets.BLING_REFRESH_TOKEN }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TELEGRAM_GESTOR_CHAT_ID: ${{ secrets.TELEGRAM_GESTOR_CHAT_ID }}

  chat_marketplaces:
    name: Chat marketplaces
    runs-on: ubuntu-latest
    needs: qualidade
    if: |
      (github.event_name == 'schedule' && (github.event.schedule == '*/30 11-23 * * *' || github.event.schedule == '*/30 0 * * *')) ||
      github.event.inputs.rotina == 'todos' ||
      github.event.inputs.rotina == 'chat'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
      - name: Instalar dependências
        run: pip install -r requirements.txt
      - name: Rodar agentes de chat
        run: |
          python -c "from agentes.ml.agente_ml import executar; print(executar())"
          python -c "from agentes.shopee.agente_shopee import executar; print(executar())"
          python -c "from agentes.magalu.agente_magalu import executar; print(executar())"
          python -c "from agentes.amazon.agente_amazon import executar; print(executar())"
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          BLING_CLIENT_ID: ${{ secrets.BLING_CLIENT_ID }}
          BLING_CLIENT_SECRET: ${{ secrets.BLING_CLIENT_SECRET }}
          BLING_ACCESS_TOKEN: ${{ secrets.BLING_ACCESS_TOKEN }}
          BLING_REFRESH_TOKEN: ${{ secrets.BLING_REFRESH_TOKEN }}
          ML_ACCESS_TOKEN: ${{ secrets.ML_ACCESS_TOKEN }}
          ML_SELLER_ID: ${{ secrets.ML_SELLER_ID }}
          ML_CLIENT_ID: ${{ secrets.ML_CLIENT_ID }}
          ML_CLIENT_SECRET: ${{ secrets.ML_CLIENT_SECRET }}
          ML_REFRESH_TOKEN: ${{ secrets.ML_REFRESH_TOKEN }}
          SHOPEE_PARTNER_ID: ${{ secrets.SHOPEE_PARTNER_ID }}
          SHOPEE_PARTNER_KEY: ${{ secrets.SHOPEE_PARTNER_KEY }}
          SHOPEE_SHOP_ID: ${{ secrets.SHOPEE_SHOP_ID }}
          SHOPEE_ACCESS_TOKEN: ${{ secrets.SHOPEE_ACCESS_TOKEN }}
          SHOPEE_REFRESH_TOKEN: ${{ secrets.SHOPEE_REFRESH_TOKEN }}
          MAGALU_CLIENT_ID: ${{ secrets.MAGALU_CLIENT_ID }}
          MAGALU_CLIENT_SECRET: ${{ secrets.MAGALU_CLIENT_SECRET }}
          MAGALU_ACCESS_TOKEN: ${{ secrets.MAGALU_ACCESS_TOKEN }}
          MAGALU_MERCHANT_ID: ${{ secrets.MAGALU_MERCHANT_ID }}
          MAGALU_REFRESH_TOKEN: ${{ secrets.MAGALU_REFRESH_TOKEN }}
          AMAZON_ACCESS_TOKEN: ${{ secrets.AMAZON_ACCESS_TOKEN }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TELEGRAM_GESTOR_CHAT_ID: ${{ secrets.TELEGRAM_GESTOR_CHAT_ID }}

  vendas_whatsapp:
    name: Notificações de vendas WhatsApp
    runs-on: ubuntu-latest
    needs: qualidade
    if: |
      (github.event_name == 'schedule' && github.event.schedule == '*/30 11-23 * * *') ||
      github.event.inputs.rotina == 'todos' ||
      github.event.inputs.rotina == 'vendas_whatsapp'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
      - name: Instalar dependências
        run: pip install -r requirements.txt
      - name: Notificar vendas no WhatsApp
        run: python -c "from agentes.vendas_notificador import executar; print(executar())"
        env:
          WHATSAPP_API_TYPE: ${{ secrets.WHATSAPP_API_TYPE }}
          WHATSAPP_API_URL: ${{ secrets.WHATSAPP_API_URL }}
          WHATSAPP_API_KEY: ${{ secrets.WHATSAPP_API_KEY }}
          WHATSAPP_INSTANCE: ${{ secrets.WHATSAPP_INSTANCE }}
          WHATSAPP_NUMERO_DESTINO: ${{ secrets.WHATSAPP_NUMERO_DESTINO }}
          WHATSAPP_BUSINESS_TOKEN: ${{ secrets.WHATSAPP_BUSINESS_TOKEN }}
          WHATSAPP_PHONE_ID: ${{ secrets.WHATSAPP_PHONE_ID }}
          ML_ACCESS_TOKEN: ${{ secrets.ML_ACCESS_TOKEN }}
          ML_SELLER_ID: ${{ secrets.ML_SELLER_ID }}
          ML_CLIENT_ID: ${{ secrets.ML_CLIENT_ID }}
          ML_CLIENT_SECRET: ${{ secrets.ML_CLIENT_SECRET }}
          ML_REFRESH_TOKEN: ${{ secrets.ML_REFRESH_TOKEN }}
          SHOPEE_PARTNER_ID: ${{ secrets.SHOPEE_PARTNER_ID }}
          SHOPEE_PARTNER_KEY: ${{ secrets.SHOPEE_PARTNER_KEY }}
          SHOPEE_SHOP_ID: ${{ secrets.SHOPEE_SHOP_ID }}
          SHOPEE_ACCESS_TOKEN: ${{ secrets.SHOPEE_ACCESS_TOKEN }}
          SHOPEE_REFRESH_TOKEN: ${{ secrets.SHOPEE_REFRESH_TOKEN }}
          MAGALU_CLIENT_ID: ${{ secrets.MAGALU_CLIENT_ID }}
          MAGALU_CLIENT_SECRET: ${{ secrets.MAGALU_CLIENT_SECRET }}
          MAGALU_ACCESS_TOKEN: ${{ secrets.MAGALU_ACCESS_TOKEN }}
          MAGALU_MERCHANT_ID: ${{ secrets.MAGALU_MERCHANT_ID }}
          MAGALU_REFRESH_TOKEN: ${{ secrets.MAGALU_REFRESH_TOKEN }}
          AMAZON_ACCESS_TOKEN: ${{ secrets.AMAZON_ACCESS_TOKEN }}
          AMAZON_LWA_CLIENT_ID: ${{ secrets.AMAZON_LWA_CLIENT_ID }}
          AMAZON_LWA_CLIENT_SECRET: ${{ secrets.AMAZON_LWA_CLIENT_SECRET }}
          AMAZON_REFRESH_TOKEN: ${{ secrets.AMAZON_REFRESH_TOKEN }}
          AMAZON_SELLER_ID: ${{ secrets.AMAZON_SELLER_ID }}
          AMAZON_MARKETPLACE_ID: ${{ secrets.AMAZON_MARKETPLACE_ID }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

  algoritmo_marketplaces:
    name: Saúde e algoritmo marketplaces
    runs-on: ubuntu-latest
    needs: qualidade
    if: |
      (github.event_name == 'schedule' && (github.event.schedule == '0 3 * * *' || github.event.schedule == '0 9 * * *' || github.event.schedule == '0 15 * * *' || github.event.schedule == '0 21 * * *')) ||
      github.event.inputs.rotina == 'todos' ||
      github.event.inputs.rotina == 'algoritmo'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
      - name: Instalar dependências
        run: pip install -r requirements.txt
      - name: Keepalive marketplaces
        run: python -c "from agentes.manutencao_marketplaces import executar; print(executar())"
        env:
          SHOPEE_PARTNER_ID: ${{ secrets.SHOPEE_PARTNER_ID }}
          SHOPEE_PARTNER_KEY: ${{ secrets.SHOPEE_PARTNER_KEY }}
          SHOPEE_SHOP_ID: ${{ secrets.SHOPEE_SHOP_ID }}
          SHOPEE_ACCESS_TOKEN: ${{ secrets.SHOPEE_ACCESS_TOKEN }}
          SHOPEE_REFRESH_TOKEN: ${{ secrets.SHOPEE_REFRESH_TOKEN }}
          MAGALU_CLIENT_ID: ${{ secrets.MAGALU_CLIENT_ID }}
          MAGALU_CLIENT_SECRET: ${{ secrets.MAGALU_CLIENT_SECRET }}
          MAGALU_ACCESS_TOKEN: ${{ secrets.MAGALU_ACCESS_TOKEN }}
          MAGALU_MERCHANT_ID: ${{ secrets.MAGALU_MERCHANT_ID }}
          MAGALU_REFRESH_TOKEN: ${{ secrets.MAGALU_REFRESH_TOKEN }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TELEGRAM_GESTOR_CHAT_ID: ${{ secrets.TELEGRAM_GESTOR_CHAT_ID }}
      - name: Avaliar saúde/algoritmo
        run: python -c "from agentes.algoritmo_marketplaces import executar; print(executar(alertar_quando_atencao=False))"
        env:
          ML_ACCESS_TOKEN: ${{ secrets.ML_ACCESS_TOKEN }}
          ML_SELLER_ID: ${{ secrets.ML_SELLER_ID }}
          ML_CLIENT_ID: ${{ secrets.ML_CLIENT_ID }}
          ML_CLIENT_SECRET: ${{ secrets.ML_CLIENT_SECRET }}
          ML_REFRESH_TOKEN: ${{ secrets.ML_REFRESH_TOKEN }}
          SHOPEE_PARTNER_ID: ${{ secrets.SHOPEE_PARTNER_ID }}
          SHOPEE_PARTNER_KEY: ${{ secrets.SHOPEE_PARTNER_KEY }}
          SHOPEE_SHOP_ID: ${{ secrets.SHOPEE_SHOP_ID }}
          SHOPEE_ACCESS_TOKEN: ${{ secrets.SHOPEE_ACCESS_TOKEN }}
          SHOPEE_REFRESH_TOKEN: ${{ secrets.SHOPEE_REFRESH_TOKEN }}
          MAGALU_CLIENT_ID: ${{ secrets.MAGALU_CLIENT_ID }}
          MAGALU_CLIENT_SECRET: ${{ secrets.MAGALU_CLIENT_SECRET }}
          MAGALU_ACCESS_TOKEN: ${{ secrets.MAGALU_ACCESS_TOKEN }}
          MAGALU_MERCHANT_ID: ${{ secrets.MAGALU_MERCHANT_ID }}
          MAGALU_REFRESH_TOKEN: ${{ secrets.MAGALU_REFRESH_TOKEN }}
          AMAZON_ACCESS_TOKEN: ${{ secrets.AMAZON_ACCESS_TOKEN }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TELEGRAM_GESTOR_CHAT_ID: ${{ secrets.TELEGRAM_GESTOR_CHAT_ID }}
